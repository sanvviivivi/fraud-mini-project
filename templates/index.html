<!-- FRONTEND -->

<!DOCTYPE html>
<html>
    <head>
        <title>Fraud Detection App</title>
        <style>
            body {
                background-color: rgb(115, 169, 240);
                color: black;
            }
        </style>
    </head>
    <body>

        <h2>Simple Fraud Detection System</h2>

        <form action="/check" method="post">
            <label>User ID:</label>
            <input type="text" name="user_id" required>
            <br><br>

            <label>Transaction Amount:</label>
            <input type="number" name="amount" required>
            <br><br>

            <button type="submit">Check Transaction</button>
        </form>

        {% if result %}                     <!--Displays 'result' from FLASK-->
            <h3>Result: {{ result }}</h3>
        {% endif %}

    </body>
</html>
